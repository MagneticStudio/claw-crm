name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: claw_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/claw_test
      SESSION_SECRET: ci-test-secret
      MCP_TOKEN: ci-test-token

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Schema changes require a boot migration
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$BASE"...HEAD | grep -q '^app/shared/schema\.ts$'; then
            if ! git diff --name-only "$BASE"...HEAD | grep -q '^app/server/boot-migrations\.ts$'; then
              echo "❌ app/shared/schema.ts changed but app/server/boot-migrations.ts did not."
              echo "   Railway does not auto-run drizzle-kit push against prod."
              echo "   Every schema change needs a matching idempotent entry in boot-migrations.ts."
              echo "   See CLAUDE.md → 'Schema changes'."
              exit 1
            fi
            echo "✅ Schema change carries a boot-migrations.ts update."
          fi
        working-directory: .

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (0 warnings allowed in CI)
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Push schema
        run: npx drizzle-kit push

      - name: Seed database
        run: npx tsx server/seed.ts

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/test-results/
